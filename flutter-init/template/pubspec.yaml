name: {{PROJECT_NAME}}
description: "{{PROJECT_NAME}} - generated by flutter-skills"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理 + 路由 + DI (一体化)
  get: ^4.6.6

  # 网络
  dio: ^5.9.0

  # JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 加密
  encrypt: ^5.0.3
  crypto: ^3.0.7
  archive: ^4.0.7
  convert: ^3.1.2

  # 配置
  flutter_dotenv: ^6.0.0

  # 存储
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.2.2

  # 文件 (跨平台)
  cross_file: ^0.3.4
  path_provider: ^2.1.5
  path: ^1.9.0

  # 媒体
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0
  video_player: ^2.10.0
  video_player_web: ^2.4.0
  video_player_web_hls: ^1.3.0
  visibility_detector: ^0.4.0+2
  screen_brightness: ^1.0.1

  # 图片选择
  image_picker: ^1.2.0

  # 下拉刷新 + 上拉加载 (yc141 同款,锁版本兼容 web)
  easy_refresh: ^3.4.0

  # 屏幕适配 — design-to-code 生成代码按 375×812 设计稿宽高,用 .w / .h / .sp 响应式
  flutter_screenutil: ^5.9.3

  # 工具
  uuid: ^4.5.2
  intl: any
  device_info_plus: ^11.3.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env.dev
    - .env.prod
    - assets/image/common/
    - assets/image/tabs/

    # Mock 数据 - 注意 Flutter assets 不递归子目录,
    # 每加一个模块,api-design / api-gen skill 必须在这里加一行。
    # 例如: 新增 announce 模块时加 - mock/announce/
    - mock/
