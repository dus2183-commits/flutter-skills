# 项目 Lint 配置
#
# 设计原则:
#   1. yc141 直接 copy 的库代码 → analyzer.exclude (不参与 lint)
#   2. 我们自己写的代码 → 严格 lint
#   3. 关闭的:纯风格规则(团队意见不一)+ 文档 doc 强制
#   4. 保留的:真 bug 防御 / 性能 / 类型安全 / 内存泄漏 / Flutter 特有

include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    # generated 文件
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/generated/**"
    - "build/**"
    - ".dart_tool/**"
    - ".fvm/**"

    # ─── yc141 直接 copy 的第三方库代码 (不参与 lint) ───
    # 这些是从 yc141_app 抄来的加密 / 图片实现,我们不修改
    - "lib/core/crypto/aes_dynamic.dart"
    - "lib/core/crypto/aes_util.dart"
    - "lib/core/media/network_image/_io.dart"
    - "lib/core/media/network_image/_web.dart"
    - "lib/core/media/network_image/queue/**"

  language:
    # 类型推断 - 放宽到 Flutter 默认水平
    # (very_good_analysis 默认全开,过严)
    strict-casts: false
    strict-inference: false
    strict-raw-types: false

  errors:
    # frontmatter 注解(freezed 用)
    invalid_annotation_target: ignore

linter:
  rules:
    # ════════════════════════════════════════════════════
    # ❌ 关闭 - 纯风格类 (团队意见不一)
    # ════════════════════════════════════════════════════
    require_trailing_commas: false              # 尾逗号
    omit_local_variable_types: false            # 本地变量省略类型
    always_use_package_imports: false           # 用 package: 还是 ../
    prefer_final_locals: false                  # 本地变量加 final
    prefer_final_in_for_each: false             # for final
    always_put_required_named_parameters_first: false
    always_declare_return_types: false
    type_annotate_public_apis: false
    sort_pub_dependencies: false                # pubspec 排序
    sort_constructors_first: false
    sort_unnamed_constructors_first: false
    prefer_single_quotes: false                 # 单引号 vs 双引号
    prefer_double_quotes: false
    flutter_style_todos: false                  # TODO 格式
    lines_longer_than_80_chars: false           # 80 太严
    cascade_invocations: false                  # 级联调用
    combinators_ordering: false                 # show/hide 排序
    directives_ordering: false                  # import 排序
    use_string_in_part_of_directives: false

    # ════════════════════════════════════════════════════
    # ❌ 关闭 - 文档强制 (太烦)
    # ════════════════════════════════════════════════════
    public_member_api_docs: false
    package_api_docs: false
    comment_references: false
    diagnostic_describe_all_properties: false

    # ════════════════════════════════════════════════════
    # ❌ 关闭 - 主观偏好
    # ════════════════════════════════════════════════════
    one_member_abstracts: false
    use_setters_to_change_properties: false
    avoid_returning_this: false
    avoid_positional_boolean_parameters: false
    parameter_assignments: false
    avoid_redundant_argument_values: false
    use_if_null_to_convert_nulls_to_bools: false
    join_return_with_assignment: false
    avoid_classes_with_only_static_members: false
    no_default_cases: false                     # switch 允许 default
    unnecessary_breaks: false                   # break in switch
    unnecessary_this: false
    prefer_asserts_with_message: false
    avoid_void_async: false                     # void async 允许
    do_not_use_environment: false               # 我们必须用 dart-define
    avoid_print: false                          # debug 方便

    # ════════════════════════════════════════════════════
    # ✅ 保留 (默认开,这里只是注释提醒)
    # ════════════════════════════════════════════════════
    # 真 bug 防御:
    #   empty_catches              ★ 静默吞错是 anti-pattern
    #   dead_code                  ★ 死代码
    #   no_duplicate_case_values   ★ switch 重复 case
    #   control_flow_in_finally    ★ finally 中 return/break
    #   throw_in_finally           ★ finally 中 throw
    #   valid_regexps              ★ 正则非法
    #   unrelated_type_equality_checks  ★ == 不同类型
    #   iterable_contains_unrelated_type ★
    #   list_remove_unrelated_type ★
    #   hash_and_equals            ★ == 必须配 hashCode
    #
    # 类型安全:
    #   await_only_futures         ★ await 非 future 是 bug
    #   avoid_dynamic_calls        ★ dynamic 调用容易出错
    #   prefer_void_to_null
    #
    # 性能 (Flutter 关键):
    #   prefer_const_constructors          ★★ const widget 性能
    #   prefer_const_literals_to_create_immutables ★
    #   prefer_const_declarations          ★
    #   sized_box_for_whitespace           ★ 用 SizedBox 不用 Container
    #
    # 内存泄漏:
    #   cancel_subscriptions       ★ Stream 必须 cancel
    #   close_sinks                ★ Sink 必须 close
    #
    # Flutter 特有:
    #   use_key_in_widget_constructors  ★ Widget 构造函数加 key
    #   use_super_parameters       ★ super.key 简洁
    #   use_build_context_synchronously ★ async 后用 context 必须检查 mounted
    #
    # 未使用代码:
    #   unused_import              ★ (默认 warning,我们保留)
    #   unused_local_variable      ★
    #   unused_field               ★
    #   unused_element             ★
    #
    # 代码清晰:
    #   unnecessary_null_checks
    #   unnecessary_null_in_if_null_operators
    #   unnecessary_null_aware_assignments
    #   unawaited_futures          ★ 未等待 future 错误丢失
    #
    # 安全:
    #   secure_pubspec_urls        ★ 必须 https
    #   avoid_relative_lib_imports
    #   avoid_web_libraries_in_flutter
